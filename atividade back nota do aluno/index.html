<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas do Aluno</title>
</head>
<body>
  <div class="container">
    <h1>Notas do Aluno</h1>

  <form id="gradeForm">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label for="nota1">Nota 1:</label>
    <input type="number" id="nota1" step="0.01" required><br><br>

    <label for="nota2">Nota 2:</label>
    <input type="number" id="nota2" step="0.01" required><br><br>

    <label for="nota3">Nota 3:</label>
    <input type="number" id="nota3" step="0.01" required><br><br>

    <button type="submit">Salvar / Atualizar</button>
  </form>

  <h2>Alunos cadastrados</h2>
  <ul id="listaAlunos"></ul>

  <script src="script.js"></script>
  <link rel="stylesheet" href="style.css">
</body>
</html>
